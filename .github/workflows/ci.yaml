name: CI

on:
  push:
    branches:
    - master

  workflow_dispatch:

env:
  ALPINE_VERSION: "3.24.0"
  BUN_VERSION: "1.3.14"
  GH_VERSION: "2.95.0"
  UBUNTU_VERSION: "26.04"
  UV_VERSION: "0.11.23"

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
    - run: |
        echo IMAGE_CREATED=$(date --utc +'%Y-%m-%dT%H:%M:%SZ') >> $GITHUB_ENV
    - uses: docker/setup-qemu-action@v3
    - uses: docker/setup-buildx-action@v4
    - uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - uses: docker/build-push-action@v7
      with:
        labels: |
          org.opencontainers.image.authors=Yang Sheng Han <progamesigner@gmail.com>
          org.opencontainers.image.created=${{ env.IMAGE_CREATED }}
          org.opencontainers.image.description=devtools
          org.opencontainers.image.documentation=https://github.com/${{ github.repository }}
          org.opencontainers.image.revision=${{ github.sha }}
          org.opencontainers.image.source=https://github.com/${{ github.repository }}
          org.opencontainers.image.title=devtools
          org.opencontainers.image.url=https://github.com/${{ github.repository }}
          org.opencontainers.image.vendor=https://github.com/${{ github.repository }}
          org.opencontainers.image.version=${{ github.sha }}
        platforms: linux/amd64,linux/arm64
        push: true
        tags: ghcr.io/${{ github.repository }}:latest
        build-args: |
          ALPINE_VERSION=${{ env.ALPINE_VERSION }}
    - uses: docker/build-push-action@v7
      with:
        context: "{{defaultContext}}:claude-code"
        labels: |
          org.opencontainers.image.authors=Yang Sheng Han <progamesigner@gmail.com>
          org.opencontainers.image.created=${{ env.IMAGE_CREATED }}
          org.opencontainers.image.description=claude-code
          org.opencontainers.image.documentation=https://github.com/${{ github.repository }}
          org.opencontainers.image.revision=${{ github.sha }}
          org.opencontainers.image.source=https://github.com/${{ github.repository }}
          org.opencontainers.image.title=claude-code
          org.opencontainers.image.url=https://github.com/${{ github.repository }}
          org.opencontainers.image.vendor=https://github.com/${{ github.repository }}
          org.opencontainers.image.version=${{ github.sha }}
        platforms: linux/amd64,linux/arm64
        push: true
        tags: ghcr.io/${{ github.repository }}/claude-code:latest
        build-args: |
          ALPINE_VERSION=${{ env.ALPINE_VERSION }}
          BUN_VERSION=${{ env.BUN_VERSION }}
          GH_VERSION=${{ env.GH_VERSION }}
          UBUNTU_VERSION=${{ env.UBUNTU_VERSION }}
          UV_VERSION=${{ env.UV_VERSION }}
